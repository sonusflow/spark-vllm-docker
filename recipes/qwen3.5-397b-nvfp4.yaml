# Recipe: Qwen3.5-397B-A17B-NVFP4
# Qwen3.5-397B model in NVIDIA NVFP4 quantization, TP=4 across 4 DGX Spark nodes
# Uses native Blackwell FP4 tensor cores via FlashInfer CUTLASS

recipe_version: "1"
name: Qwen3.5-397B-NVFP4
description: Qwen3.5-397B NVFP4 with native FP4 tensor cores, TP=4 across 4 DGX Spark nodes

model: nvidia/Qwen3.5-397B-A17B-NVFP4

container: vllm-node-tf5

build_args:
  - --tf5

mods:
  - mods/fix-qwen3-coder-next

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.78
  max_model_len: 32768
  max_num_batched_tokens: 8192

env:
  VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8: 1

command: |
  vllm serve nvidia/Qwen3.5-397B-A17B-NVFP4 \
    --quantization modelopt \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --enable-auto-tool-choice \
    --tensor-parallel-size {tensor_parallel} \
    --distributed-executor-backend ray \
    --kv-cache-dtype fp8 \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-prefix-caching \
    --trust-remote-code \
    --enforce-eager \
    --host {host} \
    --port {port}
