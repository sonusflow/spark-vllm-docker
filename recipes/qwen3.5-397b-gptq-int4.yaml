# Recipe: Qwen3.5-397B-A17B-GPTQ-Int4
# Official Qwen GPTQ Int4 quantization with MoE-aware W4A16 kernels, TP=4 across 4 DGX Spark nodes
# Note: --dtype float16 enables Exllama fallback for in_proj_ba but produces garbage with INT4 quants
# Using Marlin TP fix instead (ReplicatedLinear for small layers)

recipe_version: "1"
name: Qwen3.5-397B-GPTQ-Int4
description: Qwen3.5-397B with official GPTQ-Int4 quantization (moe_wna16), TP=4

# HuggingFace model to download
model: Qwen/Qwen3.5-397B-A17B-GPTQ-Int4

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

# Mods: coder-next parser + Marlin TP fix for in_proj_ba small layers
mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen35-tp4-marlin

# Default settings
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.78
  max_model_len: 32768
  max_num_batched_tokens: 8192

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3.5-397B-A17B-GPTQ-Int4 \
    --quantization moe_wna16 \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --enable-auto-tool-choice \
    --tensor-parallel-size {tensor_parallel} \
    --distributed-executor-backend ray \
    --kv-cache-dtype fp8 \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-prefix-caching \
    --trust-remote-code \
    --host {host} \
    --port {port}
